<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Link Analyzer</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <main class="container-sm py-4">
      <h1>Link Analyzer</h1>
      <form id="analyze-form" class="mb-5">
        <label for="url-input" class="form-label">Enter a URL to analyze</label>
        <div class="d-flex gap-2 align-items-start">
          <input
            class="form-control flex-grow-0"
            style="width: 420px; max-width: 100%"
            id="url-input"
            name="url"
            type="url"
            placeholder="https://example.com"
            required
          />
          <button type="submit" class="btn btn-primary">Analyze</button>
        </div>
      </form>

      <section>
        <h2>Result</h2>
        <div id="status">No links yet.</div>
        <div id="report-section" class="mt-3 d-none">
          <div class="row g-3 mb-3">
            <div class="col-12 col-md-6">
              <div class="card h-100">
                <div class="card-body">
                  <h3 class="h5 mb-3">Overview</h3>
                  <dl class="row mb-0">
                    <dt class="col-4">HTML version</dt>
                    <dd class="col-8" id="report-html-version">-</dd>
                    <dt class="col-4">Page title</dt>
                    <dd class="col-8" id="report-page-title">-</dd>
                    <dt class="col-4">Is a login page</dt>
                    <dd class="col-8" id="report-is-login-page">-</dd>
                  </dl>
                </div>
              </div>
            </div>
            <div class="col-12 col-md-6">
              <div class="card h-100">
                <div class="card-body">
                  <h3 class="h5 mb-3">Link Metrics</h3>
                  <dl class="row mb-0">
                    <dt class="col-4">External links</dt>
                    <dd class="col-8" id="report-external-links">-</dd>
                    <dt class="col-4">Internal links</dt>
                    <dd class="col-8" id="report-internal-links">-</dd>
                    <dt class="col-4">Inaccessible links</dt>
                    <dd class="col-8" id="report-inaccessible-links">-</dd>
                  </dl>
                </div>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-body">
              <h3 class="h5 mb-3">Heading Metrics</h3>
              <ul id="heading-counts-list" class="list-group list-group-flush"></ul>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
